services:
  # ========================
  # Redis
  # ========================
  redis:
    image: redis:7-alpine
    container_name: ai-tasks-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ai-tasks-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Backend API
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-tasks-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-tasks-network

  # ========================
  # Python Worker
  # ========================
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: ai-tasks-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-tasks-network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 384M
        reservations:
          cpus: '0.20'
          memory: 256M

  # ========================
  # Frontend
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-tasks-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-tasks-network

volumes:
  redis_data:
    driver: local

networks:
  ai-tasks-network:
    driver: bridge
